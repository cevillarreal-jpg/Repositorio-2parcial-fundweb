<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Editar Perfil</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="../Recursos/icono.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../Estilos/General.css">
    <link rel="stylesheet" href="../Estilos/EditarPerfil.css">
</head>

<body>

    <h1 class="titulo-editar">
        Editar Perfil
    </h1>

    <div class="contenedor-formulario">
        <h2>
            Información Personal
        </h2>

        <form method="get" action="panelUsuario.html" class="form-editar">
            <label>
                Nombre Completo:
            </label>
            <input type="text"
            id="nombre"
            name="nombre"
            value="Christopher Villarreal">

            <label>
                Correo Electrónico:
            </label>
            <input type="email"
            id="email"
            name="email"
            value="christopher@example.com">

            <label>
                Teléfono:
            </label>
            <input type="text"
            id="telefono"
            name="telefono"
            value="0980372175">

            <label>
                Nivel Académico:
            </label>
            <select id="nivel" name="nivel">
                <option>Primer Nivel</option>
                <option>Segundo Nivel</option>
                <option>Tercer Nivel</option>
            </select>

            <h2 class="subtitulo-materias">
                Materias que puedes enseñar
            </h2>

            <div class="grupo-materias">
                <label class="materia-ensenar">
                    <input type="checkbox"
                    class="check"
                    name="materias"
                    value="Programación"
                    checked>
                    Programación
                </label>

                <label class="materia-sistemas">
                    <input type="checkbox"
                    class="check"
                    name="materias"
                    value="Admin Sistemas">
                    Admin Sistemas
                </label>

                <label class="materia-fundamentos">
                    <input type="checkbox"
                    class="check"
                    name="materias"
                    value="Fundamentos Web">
                    Fundamentos Web
                </label>
            </div>

            <h2 class="subtitulo-materias">
                Materias que deseas aprender
            </h2>

            <div class="grupo-materias">
                <label class="materia-aprender">
                    <input type="checkbox"
                    class="check"
                    name="materias"
                    value="Base de Datos"
                    checked>
                    Base de Datos
                </label>

                <label class="materia-ensenar">
                    <input type="checkbox"
                    class="check"
                    name="materias"
                    value="Programación">
                    Programación
                </label>
            </div>

            <button class="btn-guardar">
                Guardar Cambios
            </button>

            <button class="btn-cancelar">
                Cancelar
            </button>
        </form>
    </div>

</body>

<footer>
        <p id="derechos">
            © 2026 - SaberCompartido
        </p>
        <p>
            Sistema de asesoramiento académico - HTML Semántico y CSS Responsivo
        </p>
        <p id="finalFoter">
            Plataforma de apoyo estudiantil
        </p>
    </footer>

</html>
