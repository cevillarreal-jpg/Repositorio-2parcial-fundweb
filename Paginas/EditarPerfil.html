<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Editar Perfil</title>
    <link rel="icon" type="image/x-icon" href="../Recursos/icono.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../Estilos/General.css">
</head>

<body>

    <h1 style="text-align: center;
    margin-top: 30px;">
        Editar Perfil
    </h1>

    <div style="width: 600px;
    margin: 30px auto;
    background-color: white;
    border-radius: 15px;
    padding: 30px;
    box-shadow: 0 4px 6px;">

        <h2>
            Información Personal
        </h2>

        <form method="get"
        action="panelUsuario.html">

            <label>
                Nombre Completo:
            </label>

            <input type="text"
            id="nombre"
            name="nombre"
            value="Christopher Villarreal"
            style="width: 100%;
            padding: 10px;
            margin-top:5px;">

            <label>
                Correo Electrónico:
            </label>

            <input type="email"
            id="email"
            name="email"
            value="christopher@example.com"
            style="width: 100%;
            padding: 10px;
            margin-top:5px;">

            <label>
                Teléfono:
            </label>

            <input type="text"
            id="telefono"
            name="telefono"
            value="0980372175"
            style="width: 100%;
            padding: 10px;
            margin-top:5px;">

            <label>
                Nivel Académico:
            </label>

            <select id="nivel"
            name="nivel"
            style="width: 100%;
            padding: 10px;
            border-radius: 8px;
            margin-top:5px;">

                <option>Primer Nivel</option>
                <option>Segundo Nivel</option>
                <option>Tercer Nivel</option>

            </select>

            <h2 style="margin-top: 25px;">
                Materias que puedes enseñar
            </h2>

            <div style="display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;">

                <label style="background-color: #87ceeb;
                padding: 10px;
                border-radius: 8px;
                cursor: pointer;
                margin-left: 0;">

                    <input type="checkbox"
                    class="check"
                    name="materias"
                    value="Programación"
                    checked
                    style="margin-right:5px;">

                    Programación

                </label>

                <label style="background-color: #dda0dd;
                padding: 10px;
                border-radius: 8px;
                cursor: pointer;
                margin-left: 0;">

                    <input type="checkbox"
                    class="check"
                    name="materias"
                    value="Admin Sistemas"
                    style="margin-right:5px;">

                    Admin Sistemas

                </label>

                <label style="background-color: #ffb347;
                padding: 10px;
                border-radius: 8px;
                cursor: pointer;
                margin-left: 0;">

                    <input type="checkbox"
                    class="check"
                    name="materias"
                    value="Fundamentos Web"
                    style="margin-right:5px;">

                    Fundamentos Web

                </label>

            </div>

            <h2 style="margin-top: 25px;">
                Materias que deseas aprender
            </h2>

            <div style="display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;">

                <label style="background-color: #90ee90;
                padding: 10px;
                border-radius: 8px;
                cursor: pointer;
                margin-left: 0;">

                    <input type="checkbox"
                    class="check"
                    name="materias"
                    value="Base de Datos"
                    checked
                    style="margin-right:5px;">

                    Base de Datos

                </label>

                <label style="background-color: #87ceeb;
                padding: 10px;
                border-radius: 8px;
                cursor: pointer;
                margin-left: 0;">

                    <input type="checkbox"
                    class="check"
                    name="materias"
                    value="Programación"
                    style="margin-right:5px;">

                    Programación

                </label>

            </div>

            <button style="width: 260px;
            height: 50px;
            margin-top: 30px;">

                Guardar Cambios

            </button>

            <button style="width: 260px;
            height: 50px;">

                Cancelar

            </button>

        </form>

    </div>

</body>

</html>
