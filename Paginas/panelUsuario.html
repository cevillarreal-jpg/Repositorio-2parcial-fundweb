<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Panel de Usuario</title>

        <link rel="icon" type="image/x-icon" href="../Recursos/icono.ico">

        <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    </head>

    <body style="background-color: rgb(234, 235, 241);
    margin: 0; padding: 0;">

        <main style="background-color: white;
        width: 100%; min-height: 150px;
        display: flex; flex-wrap: wrap;
        align-items: center; justify-content: space-between;
        padding: 20px 4%;
        box-sizing: border-box;">

            <div style="display: flex; align-items: center;
            flex-wrap: wrap; width: 70%;">

                <img src="../Recursos/panelUsuario/iconousuario.png"
                style="width: 120px; max-width: 100%;
                margin-right: 30px;" title="Perfil">

                <div style="min-width: 250px;">

                    <h1 style="font-family: Arial, Helvetica, sans-serif;
                    font-size: 2vw; min-font-size: 24px;
                    margin-bottom: 10px;">
                        Bienvenido, Christopher
                    </h1>

                    <h2 style="font-family: Arial, Helvetica, sans-serif;
                    font-size: 1.5vw; color: gray; font-weight: lighter;">
                        Primer Nivel
                    </h2>

                </div>

            </div>

            <a href="login.html"
            title="Volver al login"
            style="text-decoration: none;">

                <button style="border: 1px solid gray;
                background-color: white;
                border-radius: 10px;
                width: 170px;
                height: 50px;
                font-family: Arial, Helvetica, sans-serif;
                font-size: 18px;
                font-weight: bold;
                cursor: pointer;">
                    Cerrar Sesión
                </button>

            </a>

        </main>





        <aside style="display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 3%;
        margin-top: 30px;">

            <section style="background-color: white;
            width: 42%;
            min-width: 320px;
            min-height: 300px;
            box-shadow: 0px 2px 6px gray;
            border-radius: 12px;
            padding-bottom: 20px;">

                <div style="display: flex;">

                    <i class="fa-solid fa-user fa-xl"
                    style="margin-left: 20px;
                    margin-top: 40px;
                    margin-right: 10px;"></i>

                    <h1 style="font-family: Arial, Helvetica, sans-serif;
                    font-size: 20px;
                    margin-top: 30px;">
                        Información Personal
                    </h1>

                </div>

                <h2 style="font-family: Arial, Helvetica, sans-serif;
                font-size: 16px;
                margin-top: 15px;
                margin-left: 30px;
                color: gray;
                font-weight: lighter;">
                    Correo Electrónico:
                </h2>

                <p style="font-family: Arial, Helvetica, sans-serif;
                font-size: 16px;
                margin-top: 10px;
                margin-left: 30px;
                font-weight: lighter;">
                    christopher@example.com
                </p>

                <h2 style="font-family: Arial, Helvetica, sans-serif;
                font-size: 16px;
                margin-top: 20px;
                margin-left: 30px;
                color: gray;
                font-weight: lighter;">
                    Teléfono:
                </h2>

                <p style="font-family: Arial, Helvetica, sans-serif;
                font-size: 16px;
                margin-top: 10px;
                margin-left: 30px;
                font-weight: lighter;">
                    0980372175
                </p>

                <h2 style="font-family: Arial, Helvetica, sans-serif;
                font-size: 16px;
                margin-top: 20px;
                margin-left: 30px;
                color: gray;
                font-weight: lighter;">
                    Nivel academico:
                </h2>

                <p style="font-family: Arial, Helvetica, sans-serif;
                font-size: 16px;
                margin-top: 10px;
                margin-left: 30px;
                font-weight: lighter;">
                    Primer Nivel
                </p>

            </section>





            <section style="background-color: white;
            width: 42%;
            min-width: 320px;
            min-height: 430px;
            box-shadow: 0px 2px 6px gray;
            border-radius: 12px;
            padding-bottom: 20px;">

                <div style="display: flex;">

                    <i class="fa-solid fa-lightbulb fa-xl"
                    style="margin-top: 40px;
                    margin-left: 30px;
                    margin-right: 10px;"></i>

                    <h1 style="font-family: Arial, Helvetica, sans-serif;
                    font-size: 20px;
                    margin-top: 30px;
                    margin-left: 10px;">
                        Puedo Enseñar
                    </h1>

                </div>

                <div style="display: flex;
                flex-wrap: wrap;
                gap: 15px;
                margin-left: 30px;">

                    <button style="border: 1px solid rgb(45, 84, 87);
                    background-color: rgb(124, 191, 230);
                    border-radius: 10px;
                    width: 150px;
                    height: 40px;
                    font-family: Arial, Helvetica, sans-serif;
                    font-size: 16px;
                    font-weight: bold;">
                        Programación
                    </button>

                    <button style="border: 1px solid rgb(45, 84, 87);
                    background-color: rgb(124, 191, 230);
                    border-radius: 10px;
                    width: 150px;
                    height: 40px;
                    font-family: Arial, Helvetica, sans-serif;
                    font-size: 16px;
                    font-weight: bold;">
                        Interfaces
                    </button>

                </div>

                <h1 style="font-family: Arial, Helvetica, sans-serif;
                font-size: 16px;
                margin-top: 20px;
                margin-left: 40px;">
                    Progreso de los cursos
                </h1>

                <progress value="82" max="100"
                title="82/100"
                style="margin-left: 40px;
                width: 70%;
                height: 35px;
                accent-color: rgb(77, 35, 151);">
                </progress><br>

                <span style="font-family: Arial, Helvetica, sans-serif;
                color: rgb(64, 64, 64);
                font-size: 14px;
                margin-left: 50px;
                font-weight: bold;">
                    82%
                </span>

                <div style="display: flex;">

                    <i class="fa-solid fa-book fa-xl"
                    style="margin-left: 30px;
                    margin-top: 40px;
                    margin-right: 10px;"></i>

                    <h1 style="font-family: Arial, Helvetica, sans-serif;
                    font-size: 20px;
                    margin-top: 30px;
                    margin-left: 10px;">
                        Quiero aprender
                    </h1>

                </div>

                <button style="border: 1px solid rgb(45, 87, 48);
                background-color: rgb(124, 230, 159);
                border-radius: 10px;
                width: 150px;
                height: 40px;
                margin-top: 10px;
                margin-left: 30px;
                font-family: Arial, Helvetica, sans-serif;
                font-size: 16px;
                font-weight: bold;">
                    Base de datos
                </button>

                <h1 style="font-family: Arial, Helvetica, sans-serif;
                font-size: 16px;
                margin-top: 20px;
                margin-left: 40px;">
                    Progreso de aprendizaje
                </h1>

                <progress value="63" max="100"
                title="63/100"
                style="margin-left: 40px;
                width: 70%;
                height: 35px;
                accent-color: rgb(30, 138, 50);">
                </progress><br>

                <span style="font-family: Arial, Helvetica, sans-serif;
                color: rgb(64, 64, 64);
                font-size: 14px;
                margin-left: 50px;
                font-weight: bold;">
                    63%
                </span>

            </section>

        </aside>






        <section style="background-color: white;
        width: 90%;
        min-height: 250px;
        margin: 30px auto;
        box-shadow: 0px 2px 6px gray;
        border-radius: 12px;
        padding-top: 30px;
        padding-bottom: 30px;">

            <h1 style="font-family: Arial, Helvetica, sans-serif;
            font-size: 20px;
            margin-left: 5%;">
                Acciones rápidas
            </h1>

            <aside style="display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 5%;">

                <button style="border: 1px solid gray;
                background-color: rgb(221, 233, 243);
                border-radius: 10px;
                width: 38%;
                min-width: 280px;
                height: 140px;
                margin-top: 20px;
                font-family: Arial, Helvetica, sans-serif;
                font-size: 18px;
                font-weight: bold;">

                    <a href="Busqueda.html"
                    style="text-decoration: none;
                    color: black;">

                        <i class="fa-solid fa-magnifying-glass fa-xl"></i>

                        <p style="font-size: 22px; margin: 0px;">
                            Buscar Estudiantes
                        </p>

                        <p style="font-size: 16px; color: gray;">
                            Encuentra compañeros
                        </p>

                    </a>

                </button>





                <button style="border: 1px solid gray;
                background-color: rgb(239, 221, 243);
                border-radius: 10px;
                width: 38%;
                min-width: 280px;
                height: 140px;
                margin-top: 20px;
                font-family: Arial, Helvetica, sans-serif;
                font-size: 18px;
                font-weight: bold;">

                    <a href="EditarPerfil.html"
                    style="text-decoration: none;
                    color: black;">

                        <i class="fa-solid fa-gear fa-xl"></i>

                        <p style="font-size: 22px; margin: 0px;">
                            Editar Perfil
                        </p>

                        <p style="font-size: 16px; color: gray;">
                            Actualizar datos personales
                        </p>

                    </a>

                </button>

            </aside>

        </section>

    </body>
</html>
