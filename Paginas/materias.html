<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Materias</title>
    <link rel="icon" type="image/x-icon" href="../Recursos/icono.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../Estilos/General.css">
    <link rel="stylesheet" href="../Estilos/materias.css">
</head>

<body>

    <form method="post" action="login.html">
        <main>
            <section class="contenedores">
                <h1>
                    ¿Qué materias Dominas?
                </h1>
                <h2>
                    Selecciona todas las materias que puedes enseñar
                </h2>
                <article>
                    <p>
                        Debe seleccionar al menos una materia que pueda enseñar
                    </p>
                </article>
                <aside>
                    <div class="ColumnasT">
                        <div class="tarjeta">
                            <img src="../Recursos/registro/libro.png" alt="libro">
                            <label>
                                Base de Datos
                            </label>
                            <input type="checkbox" name="materia_dominada" value="Base de Datos"
                            class="check">
                        </div>
                        <div class="tarjeta">
                            <img src="../Recursos/registro/libronaranja.png" alt="libro">
                            <label>
                                Fundamentos Web
                            </label>
                            <input type="checkbox" name="materia_dominada" value="Fundamentos"
                            class="check">
                        </div>
                        <div class="tarjeta">
                            <img src="../Recursos/registro/libroverde.png" alt="libro">
                                <label>
                                    Programación
                                </label>
                                <input type="checkbox" name="materia_dominada" value="Programación"
                                class="check">
                        </div>
                    </div>

                    <div class="ColumnasT">
                        <div class="tarjeta">
                            <img src="../Recursos/registro/libromorado.png" alt="libro">
                                <label>
                                    Admin Sistemas
                                </label>
                                <input type="checkbox" name="materia_dominada" value="Admin Sistemas"
                                class="check">
                        </div>
                        <div class="tarjeta">
                            <img src="../Recursos/registro/librorojo.png" alt="libro">
                            <label>
                                Interfaces Gráficas
                            </label>
                            <input type="checkbox" name="materia_dominada" value="Interfaces Gráficas"
                            class="check">
                        </div>
                        <div class="tarjeta">
                            <img src="../Recursos/registro/libroceleste.png" alt="libro">
                            <label>
                                Redes
                            </label>
                            <input type="checkbox" name="materia_dominada" value="Redes"
                            class="check">
                        </div>
                    </div>
                </aside>
                <div class="contBoton">
                    <button>
                        <a href="registro.html">
                            Volver
                        </a>
                    </button>
                </div>
            </section>



            <section class="contenedores">

                <h1>
                    ¿Qué materias Deseas Aprender?
                </h1>
                <h2>
                    Selecciona todas las materias en las que necesitas ayuda
                </h2>
                <article>
                    <p>
                        Debe seleccionar al menos una materia que desees aprender
                    </p>
                </article>

                <aside>
                    <div class="ColumnasT">
                        <div class="tarjeta">
                            <img src="../Recursos/registro/libro.png" alt="libro">
                            <label>
                                Base de Datos
                            </label>
                            <input type="checkbox" name="materia_deseada" value="Base de Datos"
                            class="check">
                        </div>

                        <div class="tarjeta">
                            <img src="../Recursos/registro/libronaranja.png" alt="libro">
                            <label>
                                Fundamentos Web
                            </label>
                            <input type="checkbox" name="materia_deseada" value="Fundamentos Web"
                            class="check">
                        </div>

                        <div class="tarjeta">
                            <img src="../Recursos/registro/libroverde.png" alt="libro">
                            <label>
                                Programación
                            </label>
                            <input type="checkbox" name="materia_deseada" value="Programación"
                            class="check">
                        </div>
                    </div>

                    <div class="ColumnasT">
                        <div class="tarjeta">
                            <img src="../Recursos/registro/libromorado.png" alt="libro">
                            <label>
                                Admin Sistemas
                            </label>
                                <input type="checkbox" name="materia_deseada" value="Admin Sistemas"
                                class="check">
                        </div>
                        <div class="tarjeta">
                            <img src="../Recursos/registro/librorojo.png" alt="libro">
                            <label>
                                Interfaces Gráficas
                            </label>
                            <input type="checkbox" name="materia_deseada" value="Interfaces Gráficas"
                            class="check">
                        </div>
                        <div class="tarjeta">
                            <img src="../Recursos/registro/libroceleste.png" alt="libro">
                            <label>
                                Redes
                            </label>
                            <input type="checkbox" name="materia_deseada" value="Redes"
                            class="check">
                        </div>
                    </div>
                </aside>
                <div class="contBoton">
                    <button>
                        Completar Registro
                    </button>
                </div>
            </section>
        </main>
    </form>
</body>
</html>
