<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="icon" type="image/x-icon" href="../Recursos/icono.ico">
    <link rel="stylesheet" href="../Estilos/General.css">
    <link rel="stylesheet"  href="../Estilos/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <section id="login">
        <div>
            <img src="../Recursos/login/circulito.jpg"
            alt="Login"
            id="logo_login">
            <h1>
                SaberCompartido
            </h1>
            <h2>
                Sistema de asesoramiento académico
            </h2>
        </div>


        <form method="post" action="panelUsuario.html">

            <h3>
                Correo Electrónico:
            </h3>

            <div class="entrada">
                <i class="fa-solid fa-at"></i>
                <input
                type="email"
                id="correo"
                name="correo"
                placeholder="usuario@ejemplo.com"
                required
                class="input_login">
            </div>

            <h3>
                Contraseña:
            </h3>

            <div class="entrada">
                <i class="fa-solid fa-lock"></i>
                <input
                type="password"
                id="contrasena"
                name="contrasena"
                placeholder="••••••••••"
                minlength="5"
                maxlength="10"
                required
                title="Debe incluir letras, números y al menos un carácter especial."
                pattern="(?=.*[A-Za-z])(?=.*\d)(?=.*[@$!%*?&.#_-])[A-Za-z\d@$!%*?&.#_-]{5,10}"
                class="input_login">
            </div>


            <div class="entrada">
                <input
                type="checkbox"
                id="recordar"
                name="recordar"
                class="check">
                <label>
                    Recordarme
                </label>
            </div>
            <button type="submit"
            class="boton_login">
                Iniciar sesión
            </button>
        </form>


        <div class="lineadivisora"></div>


        <div class="div_c">
            <label>
                ¿No tiene una cuenta?
            </label>
            <a href="registro.html">
                Regístrarse
            </a>
            <button
            class="boton_login">
                <a href="Administrador.html">
                    Inicio Administrador
                </a>
            </button>
        </div>
    </section>

    
</body>
</html>
