<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link rel="icon" type="image/x-icon" href="../Recursos/icono.ico">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body style="background-color: rgb(238, 238, 238); margin: 0;
display: flex; justify-content: center; align-items: center;
min-height: 100vh; padding: 20px; box-sizing: border-box;">

    <section style="background-color: white;
    width: 100%; max-width: 380px; min-height: 700px;
    border-radius: 15px; box-shadow: 0px 4px 10px rgba(0,0,0,0.15);
    padding: 30px 20px; box-sizing: border-box;">

        <div style="display: flex;
        flex-direction: column;
        align-items: center;">

            <img src="../Recursos/login/circulito.jpg"
            alt="Login"
            style="width: 90px;
            max-width: 100%;">

            <h1 style="font-family: Arial, Helvetica, sans-serif;
            text-align: center;
            margin-top: 20px;
            font-size: 28px;
            color: rgb(20,20,20);">
                SaberCompartido
            </h1>

            <h2 style="font-family: Arial, Helvetica, sans-serif;
            text-align: center;
            font-size: 16px;
            margin-top: 10px;
            font-weight: lighter;
            color: rgb(112, 111, 111);
            width: 90%;">
                Sistema de asesoramiento académico
            </h2>

        </div>

        <form method="post" action="panelUsuario.html">

            <h3 style="font-family: Arial, Helvetica, sans-serif;
            margin-top: 35px;
            margin-bottom: 7px;
            font-size: 16px;">
                Correo Electrónico:
            </h3>

            <div style="display: flex;
            align-items: center;">

                <i class="fa-solid fa-at"
                style="color: rgb(78, 78, 78);
                margin-right: 10px;"></i>

                <input type="email"
                id="correo"
                name="correo"
                placeholder="usuario@ejemplo.com"
                required
                style="width: 100%;
                height: 45px;
                border-radius: 10px;
                border: 2px solid gray;
                padding-left: 15px;
                font-size: 16px;
                box-sizing: border-box;">

            </div>

            <h3 style="font-family: Arial, Helvetica, sans-serif;
            margin-top: 25px;
            margin-bottom: 7px;
            font-size: 16px;">
                Contraseña:
            </h3>

            <div style="display: flex;
            align-items: center;">

                <i class="fa-solid fa-lock"
                style="color: rgb(78, 78, 78);
                margin-right: 10px;"></i>

                <input type="password"
                id="contrasena"
                name="contrasena"
                placeholder="••••••••••"
                minlength="5"
                maxlength="10"
                required
                title="Debe incluir letras, números y al menos un carácter especial."
                pattern="(?=.*[A-Za-z])(?=.*\d)(?=.*[@$!%*?&.#_-])[A-Za-z\d@$!%*?&.#_-]{5,10}"
                style="width: 100%;
                height: 45px;
                border-radius: 10px;
                border: 2px solid gray;
                padding-left: 15px;
                font-size: 16px;
                box-sizing: border-box;">

            </div>

            <div style="display: flex;
            align-items: center;
            margin-top: 20px;">

                <input type="checkbox"
                id="recordar"
                name="recordar"
                style="transform: scale(1.3);">

                <label style="font-family: Arial, Helvetica, sans-serif;
                font-weight: bold;
                font-size: 16px;
                margin-left: 10px;
                color: rgb(112, 111, 111);">
                    Recordarme
                </label>

            </div>

            <button type="submit"
            style="margin-top: 30px;
            width: 100%;
            height: 50px;
            border-radius: 12px;
            border: 2px solid rgb(10, 10, 32);
            background-color: rgb(10, 10, 32);
            color: white;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 18px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
            cursor: pointer;">

                Iniciar sesión

            </button>

        </form>

        <div style="background-color: gray;
        width: 100%;
        height: 2px;
        margin-top: 35px;
        margin-bottom: 25px;">
        </div>

        <div style="text-align: center;">

            <label style="font-family: Arial, Helvetica, sans-serif;
            font-weight: bold;
            font-size: 16px;
            color: gray;">
                ¿No tiene una cuenta?
            </label>

            <a href="registro.html"
            style="text-decoration: none;
            font-family: Arial, Helvetica, sans-serif;
            font-weight: bold;
            font-size: 16px;
            color: rgb(10, 10, 32);
            margin-left: 5px;">

                Regístrarse

            </a>

            <button style="width: 100%; height: 50px; background-color: rgb(10, 10, 32);
            color: white; font-family: Arial, Helvetica, sans-serif; font-size: 16px;
            font-weight: bold; border-radius: 12px; border: 1px solid rgb(10, 10, 32);
            margin-top: 20px; box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
            cursor: pointer;">
                <a href="Administrador.html" style="text-decoration: none;
                color: white;">
                    Inicio Administrador
                </a>
            </button>

        </div>

    </section>

</body>

</html>
