<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="icon" type="image/x-icon" href="../Recursos/icono.ico">
    <link rel="stylesheet" href="../Estilos/General.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body style="display: flex; justify-content: center; align-items: center;
min-height: 100vh; padding: 20px;">

    <section id="login">

        <div class="div_c">

            <img src="../Recursos/login/circulito.jpg"
            alt="Login"
            id="logo_login">

            <h1 style="margin-top: 20px;">
                SaberCompartido
            </h1>

            <h2 style="width: 90%; margin-left: auto; margin-right: auto;">
                Sistema de asesoramiento académico
            </h2>

        </div>

        <form method="post" action="panelUsuario.html">

            <h3 style="margin-top: 35px;">
                Correo Electrónico:
            </h3>

            <div style="display: flex; align-items: center;">

                <i class="fa-solid fa-at"
                style="color: rgb(78, 78, 78);
                margin-right: 10px;"></i>

                <input
                type="email"
                id="correo"
                name="correo"
                placeholder="usuario@ejemplo.com"
                required
                class="input_login">

            </div>

            <h3 style="margin-top: 25px;">
                Contraseña:
            </h3>

            <div style="display: flex; align-items: center;">

                <i class="fa-solid fa-lock"
                style="color: rgb(78, 78, 78);
                margin-right: 10px;"></i>

                <input
                type="password"
                id="contrasena"
                name="contrasena"
                placeholder="••••••••••"
                minlength="5"
                maxlength="10"
                required
                title="Debe incluir letras, números y al menos un carácter especial."
                pattern="(?=.*[A-Za-z])(?=.*\d)(?=.*[@$!%*?&.#_-])[A-Za-z\d@$!%*?&.#_-]{5,10}"
                class="input_login">

            </div>

            <div style="display: flex;
            align-items: center;
            margin-top: 20px;">

                <input
                type="checkbox"
                id="recordar"
                name="recordar"
                class="check">

                <label>
                    Recordarme
                </label>

            </div>

            <button type="submit"
            class="boton_login"
            style="box-shadow: 0px 4px 10px rgba(0,0,0,0.2);">

                Iniciar sesión

            </button>

        </form>

        <div style="margin-top: 35px;
        margin-bottom: 25px;">
        </div>

        <div class="div_c">

            <label>
                ¿No tiene una cuenta?
            </label>

            <a href="registro.html"
            style="margin-left: 5px;">

                Regístrarse

            </a>

            <button
            style="width: 100%;
            margin-top: 20px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.2);">

                <a href="Administrador.html">
                    Inicio Administrador
                </a>

            </button>

        </div>

    </section>

</body>

</html>
